<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/styles.css">
    <link rel="stylesheet" href="estilos/media-queries.css" media="all">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Icons">
    <title>Login</title>
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">

            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                <form action="login.php" method="post" autocomplete="on">
                    <div class="campo">
                        <i class="material-icons">person</i>
                        <input type="email"  name="login" id="ilogin" placeholder="Seu email" autocomplete="email" required maxlength="40">
                             <label for="email">Login</label>
                    </div>
                        
                        <div class="campo">
                            <i class="material-icons">lock</i>
                            <input type="password"  name="senha" id="isenha" placeholder="Sua senha" autocomplete="current-password" required minlength="6" maxlength="20">
                                <label for="senha">Senha</label>
                    </div>
                    <input type="submit" value="Entrar">
                    <a href="#" class="btn">
                        Esqueci minha senha<i class="material-icons">chevron_right</i>
                    </a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
